name: Напоминание о расписании

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 7:30 UTC, понедельник–пятница
  workflow_dispatch:

jobs:
  send-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ========== ДИАГНОСТИКА: проверяем секреты ==========
      - name: 🔍 Проверка секретов Telegram
        run: |
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID задан: ${{ secrets.TELEGRAM_CHAT_ID }}"
          else
            echo "❌ TELEGRAM_CHAT_ID НЕ ЗАДАН или пуст!"
          fi
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN задан (первые 5 символов: ${{ secrets.TELEGRAM_BOT_TOKEN }}...)"
          else
            echo "❌ TELEGRAM_BOT_TOKEN НЕ ЗАДАН или пуст!"
          fi

      - name: Определяем день недели
        id: day_of_week
        run: |
          DAY_NUM=$(date +%u)
          case $DAY_NUM in
            1) echo "day=понедельник" ;;
            2) echo "day=вторник" ;;
            3) echo "day=среда" ;;
            4) echo "day=четверг" ;;
            5) echo "day=пятница" ;;
            6) echo "day=суббота" ;;
            7) echo "day=воскресенье" ;;
          esac >> $GITHUB_OUTPUT

      - name: Формируем расписание
        id: schedule
        run: |
          DAY="${{ steps.day_of_week.outputs.day }}"
          if jq -e ".\"$DAY\"" schedule.json > /dev/null 2>&1; then
            SCHEDULE=$(jq -r ".\"$DAY\"[] | \"• \(.time) - \(.subject) (ауд. \(.room))\"" schedule.json)
            MESSAGE="<b>РАСПИСАНИЕ НА $DAY</b>%0A%0A$SCHEDULE"
          else
            MESSAGE="<b>ПАР НЕТ!</b> Можно отдохнуть."
          fi
          # Экранируем для передачи в curl (перенос строки уже %0A)
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      # ========== ОТПРАВКА С ДИАГНОСТИКОЙ ==========
      - name: 📨 Отправляем в Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="${{ steps.schedule.outputs.message }}"
          if [ -z "$MESSAGE" ]; then
            echo "❌ ОШИБКА: сообщение пустое"
            exit 1
          fi
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi