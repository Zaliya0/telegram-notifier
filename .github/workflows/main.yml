name: Трекер привычек

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Генерируем сообщение с привычками
        id: message
        run: |
          PROJECT_NAME=$(jq -r '.project_name' habits.json)
          WEEKLY_GOAL=$(jq -r '.weekly_goal' habits.json)
          
          MESSAGE="🎯 *$PROJECT_NAME* 🎯%0A"
          MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━━━━━━%0A%0A"
          MESSAGE="${MESSAGE}📅 *Дата: $(date +'%d.%m.%Y')*%0A"
          MESSAGE="${MESSAGE}🎯 *Цель на неделю:* $WEEKLY_GOAL/7 дней%0A%0A"
          
          MESSAGE="${MESSAGE}✅ *Список привычек на сегодня:*%0A%0A"
          
          counter=1
          while IFS= read -r habit; do
            case $habit in
              *"зал"*) emoji="💪" ;;
              *"колы"*) emoji="🥤" ;;
              *"тикток"*) emoji="📱" ;;
              *"зумер"*|*"молодеж"*) emoji="😎" ;;
              *) emoji="✅" ;;
            esac
            MESSAGE="${MESSAGE}$emoji $counter. $habit%0A"
            counter=$((counter + 1))
          done < <(jq -r '.habits[]' habits.json)
          
          MESSAGE="${MESSAGE}%0A━━━━━━━━━━━━━━━━━━━━━%0A"
          MESSAGE="${MESSAGE}🔥 *Мотивация на сегодня:*%0A"
          MESSAGE="${MESSAGE}«надо делать для максимального аурафарминга»"
          
          {
            echo "text<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}" \
            -d parse_mode="Markdown"

      - name: Сохраняем историю
        run: |
          echo "$(date): Отправлен отчёт о привычках" >> history.log
          
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "Обновление от $(date +'%Y-%m-%d')" || echo "Нет изменений"
          git push || echo "Нечего пушить"