name: Трекер привычек

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Генерируем сообщение с привычками
        id: message
        run: |
          # Проверяем наличие файла
          if [ ! -f habits.json ]; then
            echo '{"project_name": "Трекер привычек", "habits": ["Сходить в зал", "Выпить 2 литра колы", "Посидеть в тиктоке 67 минут", "Повторить молодежные зумерские слова"], "reminder_time": "09:00", "weekly_goal": 4}' > habits.json
          fi
          
          # Читаем данные из JSON
          PROJECT_NAME=$(jq -r '.project_name' habits.json)
          WEEKLY_GOAL=$(jq -r '.weekly_goal' habits.json)
          
          # Формируем сообщение
          MESSAGE="🎯 *$PROJECT_NAME* 🎯%0A"
          MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━━━━━━%0A%0A"
          MESSAGE="${MESSAGE}📅 *Дата:* $(date +'%d.%m.%Y')%0A"
          MESSAGE="${MESSAGE}🎯 *Цель на неделю:* $WEEKLY_GOAL/7 дней%0A%0A"
          
          MESSAGE="${MESSAGE}✅ *Список привычек на сегодня:*%0A%0A"
          
          # Добавляем каждую привычку с эмодзи
          counter=1
          for habit in $(jq -r '.habits[]' habits.json); do
            case $habit in
              *"зал"*) emoji="💪" ;;
              *"колы"*) emoji="🥤" ;;
              *"тикток"*) emoji="📱" ;;
              *"зумер"*) emoji="😎" ;;
              *) emoji="✅" ;;
            esac
            MESSAGE="${MESSAGE}$emoji $counter. $habit%0A"
            counter=$((counter + 1))
          done
          
          MESSAGE="${MESSAGE}%0A━━━━━━━━━━━━━━━━━━━━━%0A"
          MESSAGE="${MESSAGE}🔥 *Мотивация на сегодня:*%0A"
          MESSAGE="${MESSAGE}«Маленькие шаги каждый день ведут к большим результатам!»%0A%0A"
          
          MESSAGE="${MESSAGE}#трекерпривычек #продуктивность"
          
          # Сохраняем в output
          {
            echo "text<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}" \
            -d parse_mode="Markdown"

      - name: Сохраняем историю отправок
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S'): Отправлен отчёт о привычках" >> history.log
          
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "📊 Обновление трекера привычек $(date +'%Y-%m-%d')" || echo "Нет изменений"
          git push || echo "Нечего пушить"